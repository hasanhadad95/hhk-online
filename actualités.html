<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Actualités RSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>📰 Actualités</h1>
    <div class="search-box">
      <input type="text" id="search" placeholder="Rechercher une actualité...">
      <button onclick="searchNews()">🔍</button>
    </div>
    <button id="dark-mode-toggle">🌙 Mode sombre</button>
  </header>

  <div id="refresh-controls">
    <div id="refresh-timer">🔄 Prochaine mise à jour dans 10:00</div>
    <button id="refresh-now" onclick="refreshNow()">Actualiser maintenant</button>
  </div>

  <nav class="categories">
    <button onclick="loadCategory('politique')">Politique</button>
    <button onclick="loadCategory('sport')">Sport</button>
    <button onclick="loadCategory('technologie')">Technologie</button>
    <button onclick="loadCategory('economie')">Économie</button>
  </nav>

  <main id="news-container">
    <p>Chargement des actualités...</p>
  </main>

  <footer>
    <p>© 2025 - HHK Online Actualités RSS</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
